<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Historical Films of Gale Largey | Official Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="The historical films of Gale Largey — reflections, storytelling, and cultural history rooted in place and memory.">
<meta name="author" content="Gale Largey">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">

<style>

/* ===== BACKGROUND ===== */

html { background-color: #F2EBDD; }

body {
  margin:0;
  min-height:100vh;
  padding-bottom:80px;
  background-color:#F2EBDD;
  font-family: Georgia, "Times New Roman", serif;
  color:#222;
  display:grid;
  grid-template-rows:25vh auto;
  text-align:center;
  line-height:1.7;
}

/* ===== QUOTE ===== */

.quote-half {
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3vh 12% 0 12%;
}

.quote {
  position:relative;
  display:inline-block;
  font-family:'Marck Script', cursive;
  font-size:clamp(1.4rem,2.5vw,1.9rem);
  color:#7c7568;
  line-height:1.6;
}

/* Opening quote — floating */
.quote::before {
  content:"“";
  position:absolute;
  left:-28px;
  top:-18px;
  font-size:3rem;
  color:#cfc5b0;
  opacity:.85;
}

/* Closing quote — floating */
.quote::after {
  content:"”";
  position:absolute;
  right:-24px;
  bottom:-22px;
  font-size:3rem;
  color:#cfc5b0;
  opacity:.85;
}

/* ===== CONTENT ===== */

.content-half {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:2vh;
}

/* ===== PORTRAIT ===== */

.portrait {
  width:clamp(150px,28vw,250px);
  opacity:1;
}

/* ===== TYPOGRAPHY ===== */

.intro {
  font-size:clamp(1.05rem,2vw,1.45rem);
  color:#5a544c;
  letter-spacing:0.14em;
  margin-top:2rem;
  margin-bottom:.6em;
}

h1 {
  font-size:clamp(1.5rem,3vw,2.6rem);
  margin:0;
  letter-spacing:0.04em;
  color:#1d1a16;
}

.divider {
  width:70px;
  height:1px;
  background-color:#b7ab98;
  margin:1em auto;
}

/* ===== MATRIX LINKS ===== */

.link-grid {
  margin-top:.6em;
  display:grid;
  grid-template-columns:auto auto;
  column-gap:14px;
  row-gap:6px;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.05rem,1.8vw,1.25rem);
}

.label {
  text-align:right;
  letter-spacing:.18em;
  font-variant:small-caps;
  color:#5b5347;
}

.link-grid a {
  text-align:left;
  color:#304a73;
  text-decoration:none;
  border-bottom:1px solid transparent;
  transition:border-color .25s ease;
}

.link-grid a:hover,
.link-grid a:focus {
  border-bottom:1px solid #304a73;
}

.footer {
  margin-top:2.8em;
  font-size:.95rem;
  color:#5a5246;
}

</style>
</head>

<body>

<div class="quote-half">
  <div class="quote">
    Sometimes, when telling a story,<br>
    the storyteller<br>
    becomes a story.
  </div>
</div>

<div class="content-half">

  <img src="Galeface_transparent_refined_v3.png" alt="Gale Largey line portrait" class="portrait">

  <div class="intro">The Historical Films of</div>
  <h1>Gale P. Largey, PhD</h1>
  <div class="divider"></div>

  <div class="link-grid">
    <div class="label">Visit</div>
    <a href="https://www.youtube.com/@GaleLargey">YouTube Channel</a>

    <div class="label">Contact</div>
    <a href="contact.html">Contact Gale</a>
  </div>

  <div class="footer">
    galelargey.org &nbsp;&nbsp;|&nbsp;&nbsp; (c) 2026
  </div>

</div>

</body>
</html>
