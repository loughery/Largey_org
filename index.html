<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Historical Films of Gale Largey | Official Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="The historical films of Gale Largey — reflections, storytelling, and cultural history rooted in place and memory.">
<meta name="author" content="Gale Largey">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">

<style>

/* ===== HISTORIC PARCHMENT ===== */
html {
  background-color: #EADCC5;
  background-image:
    radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px);
  background-size: 4px 4px, 7px 7px;
}

/* ===== FILM DUST ===== */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,.08) 1px, transparent 2px),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,.06) 1px, transparent 2px),
    radial-gradient(circle at 40% 80%, rgba(0,0,0,.07) 1px, transparent 2px);
  background-size: 300px 300px;
  animation: dustDrift 40s linear infinite;
  opacity: .25;
}

@keyframes dustDrift {
  from { transform: translateY(0px); }
  to   { transform: translateY(-200px); }
}

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  color: #26221c;
  text-align: center;
  line-height: 1.9;
  padding: clamp(80px, 14vh, 160px) 20px;
}

.page {
  max-width: 900px;
  margin: 0 auto;
}

/* ===== QUOTE ===== */
.quote-half {
  margin-bottom: clamp(60px, 8vh, 110px);
}

.quote {
  font-family: 'Marck Script', cursive;
  font-size: clamp(1.25rem, 4vw, 2.6rem);
  color: #7f7567;
  line-height: 1.75;
  max-width: 95%;
  margin: 0 auto;
}

.quote-line {
  opacity: 0;
  transform: translateY(18px);
  animation: fadeLine 1.6s ease forwards;
}

/* Emphasized second line */
.quote-line:nth-child(2) {
  font-size: 1.22em;
  color: #655c4f;
  letter-spacing: 0.04em;
  text-shadow: 0 1px 0 rgba(255,255,255,.25);
  animation-duration: 2s;
}

.quote-line:nth-child(1) { animation-delay: .5s; }
.quote-line:nth-child(2) { animation-delay: 1.4s; }
.quote-line:nth-child(3) { animation-delay: 2.3s; }

@keyframes fadeLine {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== PORTRAIT ===== */
.portrait {
  width: clamp(210px, 35vw, 352px);
  margin-bottom: 2rem;
  filter: sepia(.25) contrast(.95);
  animation: kenburns 45s ease-in-out infinite alternate;
}

@keyframes kenburns {
  from { transform: scale(1); }
  to   { transform: scale(1.05); }
}

/* ===== TYPOGRAPHY ===== */
.intro {
  font-size: clamp(1rem, 1.5vw, 1.2rem);
  color: #6b6255;
  letter-spacing: 0.18em;
  margin-bottom: .6em;
}

h1 {
  font-size: clamp(1.5rem, 4vw, 3rem);
  margin: 0;
  letter-spacing: 0.08em;
  color: #1b1814;
  white-space: nowrap;
}

@media (max-width: 600px) {
  h1 {
    font-size: clamp(1.2rem, 5vw, 1.6rem);
  }
}

.divider {
  width: 100px;
  height: 1px;
  background-color: #bcae97;
  margin: 1.6em auto;
}

/* ===== VISIT / CONTACT ===== */
.link-grid {
  margin-top: 1.8em;
  display: grid;
  grid-template-columns: minmax(auto, max-content) minmax(auto, max-content);
  column-gap: clamp(20px, 4vw, 60px);
  row-gap: 14px;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}

.label {
  text-align: right;
  letter-spacing: .28em;
  font-variant: small-caps;
  color: #6b6255;
}

.link-grid a {
  text-align: left;
  color: #3e5578;
  text-decoration: none;
  transition: opacity .35s ease;
}

.link-grid a:hover {
  opacity: .6;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 4.5em;
  font-size: 1rem;
  color: #5f564a;
}

/* ===== LAST UPDATED (SMALLER) ===== */
.last-update {
  margin-top: .8em;
  font-size: 0.8rem;
  color: #8a8174;
  font-style: italic;
  letter-spacing: 0.03em;
}

</style>
</head>

<body>

<div class="page">

  <div class="quote-half">
    <div class="quote">
      <div class="quote-line">“Sometimes, when telling a story,</div>
      <div class="quote-line">the storyteller</div>
      <div class="quote-line">becomes a story.”</div>
    </div>
  </div>

  <img src="Galeface2.png" alt="Gale Largey line portrait" class="portrait">

  <div class="intro">The Historical Films of</div>
  <h1>Gale P. Largey, PhD</h1>
  <div class="divider"></div>

  <div class="link-grid">
    <div class="label">Visit</div>
    <a href="https://www.youtube.com/@GaleLargey">YouTube Channel</a>

    <div class="label">In-Person Stories</div>
    <a href="contact.html">Contact Gale</a>
  </div>

  <div class="footer">
    galelargey.org &nbsp;&nbsp;|&nbsp;&nbsp; (c) 2026
  </div>

  <div class="last-update" id="lastUpdated"></div>

</div>

<script>
(function () {
  const options = {
    timeZone: 'America/New_York',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  };

  const formatter = new Intl.DateTimeFormat('en-US', options);
  const now = new Date();
  const formatted = formatter.format(now);

  document.getElementById('lastUpdated').textContent =
    "Last Updated: " + formatted + " EST";
})();
</script>

</body>
</html>
