<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Historical Films of Gale Largey | Official Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="The historical films of Gale Largey — reflections, storytelling, and cultural history rooted in place and memory.">
<meta name="author" content="Gale Largey">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">

<style>

/* ===== PARCHMENT BACKGROUND ===== */
html {
  background-color: #F3ECDD;
  background-image:
    radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
  background-size: 4px 4px, 7px 7px;
}

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  color: #2a2723;
  text-align: center;
  line-height: 1.8;

  /* Dramatic vertical spacing */
  padding: clamp(90px, 14vh, 180px) 24px;

  animation: fadeInPage 1.4s ease forwards;
  opacity: 0;
}

@keyframes fadeInPage {
  to { opacity: 1; }
}

/* ===== WRAPPER ===== */
.page {
  max-width: 900px;
  margin: 0 auto;
}

/* ===== QUOTE ===== */
.quote-half {
  margin-bottom: clamp(70px, 10vh, 140px);
  animation: fadeUp 1.5s ease forwards;
  opacity: 0;
  animation-delay: .3s;
}

.quote {
  font-family: 'Marck Script', cursive;
  font-size: clamp(1.6rem, 2.8vw, 2.2rem);
  color: #8a8276;
  line-height: 1.7;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== CONTENT ===== */
.content-half {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== PORTRAIT ===== */
.portrait {
  width: clamp(170px, 30vw, 280px);
  margin-bottom: 2.4rem;
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: .8s;
}

/* ===== TYPOGRAPHY ===== */
.intro {
  font-size: clamp(1.2rem, 2.2vw, 1.6rem);
  color: #6a6257;
  letter-spacing: 0.16em;
  margin-bottom: .7em;
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: 1.2s;
}

h1 {
  font-size: clamp(1.7rem, 3.5vw, 2.9rem);
  margin: 0;
  letter-spacing: 0.05em;
  color: #1f1c18;
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: 1.4s;
}

.divider {
  width: 80px;
  height: 1px;
  background-color: #c2b7a5;
  margin: 1.4em auto;
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: 1.6s;
}

/* ===== LINK MATRIX ===== */
.link-grid {
  margin-top: 1.2em;
  display: grid;
  grid-template-columns: auto auto;
  column-gap: 16px;
  row-gap: 10px;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.15rem, 2vw, 1.35rem);
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: 1.8s;
}

.label {
  text-align: right;
  letter-spacing: .2em;
  font-variant: small-caps;
  color: #6b6257;
}

.link-grid a {
  text-align: left;
  color: #3a5278;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color .3s ease;
}

.link-grid a:hover,
.link-grid a:focus {
  border-bottom: 1px solid #3a5278;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 4em;
  font-size: 1rem;
  color: #6a6155;
  animation: fadeUp 1.6s ease forwards;
  opacity: 0;
  animation-delay: 2s;
}

/* ===== MOBILE REFINEMENT ===== */
@media (max-width: 600px) {

  body {
    padding: 80px 18px;
  }

  .link-grid {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .label {
    text-align: center;
  }

}

</style>
</head>

<body>

<div class="page">

  <div class="quote-half">
    <div class="quote">
      “Sometimes, when telling a story,<br>
      the storyteller<br>
      becomes a story.”
    </div>
  </div>

  <div class="content-half">

    <img src="Galeface2.png" alt="Gale Largey line portrait" class="portrait">

    <div class="intro">The Historical Films of</div>
    <h1>Gale P. Largey, PhD</h1>
    <div class="divider"></div>

    <div class="link-grid">
      <div class="label">Visit</div>
      <a href="https://www.youtube.com/@GaleLargey">YouTube Channel</a>

      <div class="label">Contact</div>
      <a href="contact.html">Contact Gale</a>
    </div>

    <div class="footer">
      galelargey.org &nbsp;&nbsp;|&nbsp;&nbsp; (c) 2026
    </div>

  </div>

</div>

</body>
</html>
