<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Historical Films of Gale Largey | Official Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="The historical films of Gale Largey — reflections, storytelling, and cultural history rooted in place and memory.">
<meta name="author" content="Gale Largey">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">

<style>

/* ===== WARM PARCHMENT BACKGROUND ===== */
html {
  background-color: #F4E8D2;
}

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  color: #2b2722;
  text-align: center;
  line-height: 1.85;
  padding: clamp(100px, 15vh, 200px) 24px;
}

/* ===== PAPER EDGE SHADOW WRAPPER ===== */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: clamp(60px, 8vw, 100px);
  background: #F4E8D2;

  /* Subtle mounted paper shadow */
  box-shadow:
    0 40px 80px rgba(0,0,0,0.10),
    0 10px 25px rgba(0,0,0,0.06);

  position: relative;
}

/* Slight paper edge gradient */
.page::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    rgba(0,0,0,0) 70%,
    rgba(0,0,0,0.05) 100%
  );
}

/* ===== QUOTE ===== */
.quote-half {
  margin-bottom: clamp(90px, 14vh, 170px);
}

.quote {
  font-family: 'Marck Script', cursive;
  font-size: clamp(1.5rem, 3vw, 2.6rem);
  color: #8f8578;
  line-height: 1.7;
}

.quote-line {
  opacity: 0;
  transform: translateY(15px);
  animation: fadeLine 1.4s ease forwards;
}

.quote-line:nth-child(1) { animation-delay: .4s; }
.quote-line:nth-child(2) { animation-delay: 1.1s; }
.quote-line:nth-child(3) { animation-delay: 1.8s; }

@keyframes fadeLine {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== CONTENT ===== */
.content-half {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== ARCHIVAL KEN BURNS PORTRAIT ===== */
.portrait {
  width: clamp(180px, 32vw, 300px);
  margin-bottom: 3rem;

  animation: kenburns 32s ease-in-out infinite alternate;
}

@keyframes kenburns {
  from {
    transform: scale(1) translateY(0);
  }
  to {
    transform: scale(1.06) translateY(-6px);
  }
}

/* ===== TYPOGRAPHY ===== */
.intro {
  font-size: clamp(1.25rem, 2.3vw, 1.7rem);
  color: #6f665a;
  letter-spacing: 0.18em;
  margin-bottom: .8em;
}

h1 {
  font-size: clamp(1.8rem, 3.8vw, 3rem);
  margin: 0;
  letter-spacing: 0.06em;
  color: #1f1b16;
}

.divider {
  width: 90px;
  height: 1px;
  background-color: #cbbda8;
  margin: 1.8em auto;
}

/* ===== LINK MATRIX ===== */
.link-grid {
  margin-top: 1.8em;
  display: grid;
  grid-template-columns: minmax(auto, max-content) minmax(auto, max-content);
  column-gap: clamp(20px, 4vw, 50px);
  row-gap: 14px;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.2rem, 2.3vw, 1.4rem);
}

.label {
  text-align: right;
  letter-spacing: .22em;
  font-variant: small-caps;
  color: #6f665a;
}

.link-grid a {
  text-align: left;
  color: #405a84;
  text-decoration: none;
  transition: opacity .3s ease;
}

.link-grid a:hover {
  opacity: .65;
}

/* ===== FOOTER ===== */
.footer {
  margin-top: 5em;
  font-size: 1.05rem;
  color: #6a6155;
}

</style>
</head>

<body>

<div class="page">

  <div class="quote-half">
    <div class="quote">
      <div class="quote-line">“Sometimes, when telling a story,</div>
      <div class="quote-line">the storyteller</div>
      <div class="quote-line">becomes a story.”</div>
    </div>
  </div>

  <div class="content-half">

    <img src="Galeface2.png" alt="Gale Largey line portrait" class="portrait">

    <div class="intro">The Historical Films of</div>
    <h1>Gale P. Largey, PhD</h1>
    <div class="divider"></div>

    <div class="link-grid">
      <div class="label">Visit</div>
      <a href="https://www.youtube.com/@GaleLargey">YouTube Channel</a>

      <div class="label">Contact</div>
      <a href="contact.html">Contact Gale</a>
    </div>

    <div class="footer">
      galelargey.org &nbsp;&nbsp;|&nbsp;&nbsp; (c) 2026
    </div>

  </div>

</div>

</body>
</html>
